name: Deploy to another repository

on:
  push:
    branches: ['main'] # или ваша основная ветка
  workflow_dispatch: # позволяет запускать вручную

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code (store repo)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Astro project
        run: npm run build
        # base уже указан в astro.config.mjs

      - name: Deploy to target repository
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Ключ доступа (как создать - см. шаг 3)
          personal_token: ${{ secrets.TARGET_REPO_TOKEN }}

          # ЦЕЛЕВОЙ РЕПОЗИТОРИЙ: вот главная строка!
          external_repository: (другой репозиторий)/(другой репозиторий).github.io

          # Ветка, куда пушить файлы (обычно main или gh-pages)
          publish_branch: main

          # Папка с готовым сайтом после сборки (у Astro это dist)
          publish_dir: ./dist

          # ПОДПАПКА В ЦЕЛЕВОМ РЕПОЗИТОРИИ: portfolio/store
          destination_dir: portfolio/store

          # Не удалять другие файлы в репозитории
          keep_files: true
